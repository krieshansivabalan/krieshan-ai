<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Access — Krieshan AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07080f; --card: rgba(255,255,255,.04); --border: rgba(255,255,255,.08);
      --gold: #c9a84c; --gold-light: #e8c96a; --violet: #7c5cbf;
      --text: #e2dff5; --muted: #7a789a;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Raleway', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    #stars {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(124,92,191,.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(201,168,76,.06) 0%, transparent 50%),
        var(--bg);
      pointer-events: none;
    }
    #stars::before {
      content: ''; position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 50%  8%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 55%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 20%, rgba(255,255,255,.7) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 60% 30%, rgba(255,255,255,.8) 0%, transparent 100%);
      background-size: 400px 300px;
      animation: twinkle 8s ease-in-out infinite alternate;
    }
    @keyframes twinkle { 0%{opacity:.5} 100%{opacity:1} }

    .wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 380px; padding: 1rem;
    }
    .logo {
      text-align: center; margin-bottom: 2.2rem;
    }
    .logo img { width: 52px; height: 52px; filter: drop-shadow(0 0 14px rgba(201,168,76,.5)); margin-bottom: .5rem; }
    .logo-name {
      font-family: 'Cinzel', serif; font-size: 1.1rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold-light), #a884e8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: .08em;
    }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 2.5rem 2rem;
    }
    h1 {
      font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 600;
      color: var(--gold); letter-spacing: .1em; text-align: center;
      margin-bottom: 1.8rem;
    }
    label {
      display: block; font-size: .72rem; letter-spacing: .08em;
      text-transform: uppercase; color: var(--muted); margin-bottom: .45rem;
    }
    input[type="password"] {
      width: 100%; padding: .7rem 1rem; border-radius: 10px;
      border: 1px solid var(--border); background: rgba(255,255,255,.05);
      color: var(--text); font-family: 'Raleway', sans-serif; font-size: .9rem;
      outline: none; margin-bottom: 1.2rem; transition: border-color .2s;
    }
    input[type="password"]:focus { border-color: var(--gold); }
    button {
      width: 100%; padding: .75rem; border: none; border-radius: 10px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: #07080f; font-family: 'Cinzel', serif; font-weight: 700;
      font-size: .85rem; letter-spacing: .07em; cursor: pointer;
      transition: opacity .2s;
    }
    button:hover { opacity: .9; }
    .error {
      background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.25);
      border-radius: 8px; padding: .65rem .9rem;
      color: #f87171; font-size: .82rem; margin-bottom: 1rem; text-align: center;
    }
    .back { text-align: center; margin-top: 1.2rem; }
    .back a { color: var(--muted); font-size: .78rem; text-decoration: none; transition: color .2s; }
    .back a:hover { color: var(--gold); }
  </style>
</head>
<body>
<div id="stars"></div>
<div class="wrap">
  <div class="logo">
    <img src="/static/lion.svg?v=2" alt="Krieshan AI"/>
    <div class="logo-name">Krieshan AI</div>
  </div>
  <div class="card">
    <h1>✦ Admin Access</h1>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter admin password" autofocus/>
      <button type="submit">Enter Dashboard</button>
    </form>
  </div>
  <div class="back"><a href="/">← Back to app</a></div>
</div>
</body>
</html>
