<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ code }} — Krieshan AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07080f; --gold: #c9a84c; --gold-light: #e8c96a;
      --text: #e2dff5; --muted: #7a789a;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Raleway', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    #stars {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(124,92,191,.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(201,168,76,.06) 0%, transparent 50%),
        var(--bg);
      pointer-events: none;
    }
    .wrap { position: relative; z-index: 1; max-width: 480px; }
    .glyph { font-size: 3.5rem; margin-bottom: 1.2rem; }
    .code {
      font-family: 'Cinzel', serif; font-size: 4rem; font-weight: 700;
      color: var(--gold-light); line-height: 1; margin-bottom: .75rem;
    }
    .msg { font-size: 1rem; color: var(--muted); line-height: 1.7; margin-bottom: 2rem; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, var(--gold), #a07828);
      color: #07080f; font-family: 'Cinzel', serif; font-weight: 700;
      font-size: .88rem; letter-spacing: .06em;
      padding: .75rem 2rem; border-radius: 8px;
      text-decoration: none; transition: transform .15s, box-shadow .15s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,168,76,.3); }
  </style>
</head>
<body>
  <div id="stars"></div>
  <div class="wrap">
    <div class="glyph">✦</div>
    <div class="code">{{ code }}</div>
    <p class="msg">{{ message }}</p>
    <a href="/" class="btn">Return Home</a>
  </div>
</body>
</html>
