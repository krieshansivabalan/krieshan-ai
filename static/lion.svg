<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="sg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffbe8"/>
      <stop offset="50%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#b8711a"/>
    </radialGradient>
    <radialGradient id="og" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5c842" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f5c842" stop-opacity="0"/>
    </radialGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ambient glow -->
  <circle cx="100" cy="100" r="95" fill="url(#og)"/>

  <!-- 8 long needle rays -->
  <g transform="translate(100,100)" fill="#f5c842" filter="url(#gl)" opacity="0.9">
    <polygon points="0,-92 2.5,-22 0,-14 -2.5,-22"/>
    <polygon points="0,92 2.5,22 0,14 -2.5,22"/>
    <polygon points="-92,0 -22,2.5 -14,0 -22,-2.5"/>
    <polygon points="92,0 22,2.5 14,0 22,-2.5"/>
    <polygon points="-65,-65 -14,-14 -10,-10 -14,-14" opacity="0.75"/>
    <polygon points="65,-65 14,-14 10,-10 14,-14" opacity="0.75"/>
    <polygon points="-65,65 -14,14 -10,10 -14,14" opacity="0.75"/>
    <polygon points="65,65 14,14 10,10 14,14" opacity="0.75"/>
  </g>

  <!-- solid 8-pointed star — no inner details -->
  <path transform="translate(100,100)" fill="url(#sg)" stroke="#c9822a" stroke-width="0.8" filter="url(#gl)"
    d="M0-54 L8-19 L38-38 L19-8 L54 0 L19 8 L38 38 L8 19 L0 54 L-8 19 L-38 38 L-19 8 L-54 0 L-19-8 L-38-38 L-8-19 Z"/>

  <!-- bright centre only -->
  <circle cx="100" cy="100" r="6" fill="#fffbe8" filter="url(#gl)"/>

  <!-- small accent stars -->
  <circle cx="30" cy="30" r="2" fill="#f5c842" opacity="0.7"/>
  <circle cx="170" cy="38" r="1.5" fill="#f5c842" opacity="0.6"/>
  <circle cx="162" cy="158" r="2" fill="#f5c842" opacity="0.65"/>
  <circle cx="36" cy="165" r="1.5" fill="#f5c842" opacity="0.55"/>
</svg>
